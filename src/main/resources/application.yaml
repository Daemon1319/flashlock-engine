# 1. COMMON SETTINGS & ACTIVE PROFILE
spring:
  application:
    name: flashlock-engine
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 2. LOCAL PROFILE 
---
spring:
  config:
    activate:
      on-profile: local
  
  datasource:
    url: jdbc:postgresql://localhost:5433/flashlockengine-local
    username: postgres
    password: postgres

server:
  port: 8081

app:
  cors:
    allowed-origins: http://localhost:3000

# 3. PROD PROFILE (Azure + Neon)
---
spring:
  config:
    activate:
      on-profile: prod

  lifecycle:
    timeout-per-shutdown-phase: 30s
    
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: require
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

server:
  port: ${PORT:8081}
  shutdown: graceful
  forward-headers-strategy: NATIVE

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never